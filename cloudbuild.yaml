steps:
  # 1. Build con secretos de Firebase
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_STORAGE_BUCKET
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_FIREBASE_APP_ID
    args:
      - -c
      - |
        docker build \
          --build-arg VITE_API_URL=https://backend-farmacov-88437624090.us-central1.run.app \
          --build-arg VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN=$$VITE_FIREBASE_AUTH_DOMAIN \
          --build-arg VITE_FIREBASE_PROJECT_ID=$$VITE_FIREBASE_PROJECT_ID \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET=$$VITE_FIREBASE_STORAGE_BUCKET \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$$VITE_FIREBASE_MESSAGING_SENDER_ID \
          --build-arg VITE_FIREBASE_APP_ID=$$VITE_FIREBASE_APP_ID \
          -t us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:$BUILD_ID \
          -t us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:latest \
          .

  # 2. Push imagen con BUILD_ID
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:$BUILD_ID'

  # 3. Push imagen latest
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:latest'

  # 4. Deploy a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend-farmacov'
      - '--image'
      - 'us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/project-1f1c8817-494f-4eb9-a0d/frontfarmacov/frontend-farmacov:latest'

availableSecrets:
  secretManager:
    - versionName: projects/project-1f1c8817-494f-4eb9-a0d/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/project-1f1c8817-494f-4eb9-a0d/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/project-1f1c8817-494f-4eb9-a0d/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/project-1f1c8817-494f-4eb9-a0d/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
      env: VITE_FIREBASE_STORAGE_BUCKET
    - versionName: projects/project-1f1c8817-494f-4eb9-a0d/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/project-1f1c8817-494f-4eb9-a0d/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID

options:
  logging: CLOUD_LOGGING_ONLY